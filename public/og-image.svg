<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
  </defs>

  <!-- Fondo -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Borde dorado sutil -->
  <rect x="40" y="40" width="1120" height="550" fill="none" stroke="#f3c948" stroke-width="1" opacity="0.3" rx="4"/>

  <!-- Marca de agua decorativa -->
  <circle cx="600" cy="315" r="240" fill="none" stroke="#f3c948" stroke-width="1" opacity="0.06"/>
  <circle cx="600" cy="315" r="190" fill="none" stroke="#f3c948" stroke-width="1" opacity="0.04"/>

  <!-- BENDITO en blanco -->
  <text x="600" y="290" font-family="Arial Black, Arial, sans-serif" font-size="120" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="12">BENDITO</text>

  <!-- SUR. en dorado outline -->
  <text x="600" y="400" font-family="Arial Black, Arial, sans-serif" font-size="120" font-weight="900" fill="none" stroke="#f3c948" stroke-width="2" text-anchor="middle" letter-spacing="12">SUR.</text>

  <!-- Tagline -->
  <text x="600" y="470" font-family="Arial, sans-serif" font-size="22" fill="#f3c948" text-anchor="middle" letter-spacing="6" opacity="0.8">PLATAFORMA PREMIUM PARA DJS DEL SUR</text>

  <!-- Dominio -->
  <text x="600" y="545" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.3)" text-anchor="middle" letter-spacing="3">www.benditosur.es</text>
</svg>
